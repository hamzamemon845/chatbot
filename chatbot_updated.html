<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UniBot – University Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f1b2d 0%, #1a2d4a 50%, #0d2137 100%);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.3);
    border-radius: 50px; padding: 6px 18px; margin-bottom: 16px;
  }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  .badge span { color: #a0c4ff; font-size: 13px; font-weight: 500; }
  .window {
    width: 100%; max-width: 600px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .chat-header {
    background: linear-gradient(90deg, #1e3a5f, #0f2742);
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #4f8ef7, #2563eb);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: bold; color: #fff;
    box-shadow: 0 0 0 3px rgba(79,142,247,0.3); flex-shrink: 0;
  }
  .header-info .name { color: #fff; font-weight: 700; font-size: 15px; }
  .header-info .status { color: #4ade80; font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; display: inline-block; }
  .messages {
    height: 360px; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
    scrollbar-width: thin; scrollbar-color: rgba(79,142,247,0.3) transparent;
  }
  .msg { display: flex; align-items: flex-start; gap: 8px; animation: fadeSlide 0.3s ease; }
  .msg.user { justify-content: flex-end; }
  .msg.user .bubble {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border-radius: 18px 18px 4px 18px; color: #fff;
  }
  .msg.bot .bubble {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px 18px 18px 4px; color: #e2e8f0;
  }
  .bubble { max-width: 72%; padding: 10px 14px; font-size: 14px; line-height: 1.6; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #4f8ef7, #2563eb);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: bold; font-size: 12px;
    flex-shrink: 0; margin-top: 2px;
  }
  .typing { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
  .typing span {
    width: 8px; height: 8px; border-radius: 50%; background: #4f8ef7;
    display: inline-block; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  .suggestions { padding: 0 20px 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    background: rgba(79,142,247,0.08); border: 1px solid rgba(79,142,247,0.25);
    color: #a0c4ff; border-radius: 20px; padding: 5px 12px;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .chip:hover { background: rgba(79,142,247,0.2); }
  .input-row {
    padding: 12px 20px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; gap: 10px;
  }
  #userInput {
    flex: 1; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 11px 16px;
    color: #e2e8f0; font-size: 14px; outline: none; font-family: inherit;
  }
  #userInput::placeholder { color: rgba(255,255,255,0.3); }
  #sendBtn {
    background: linear-gradient(135deg, #4f8ef7, #2563eb);
    border: none; border-radius: 12px; width: 46px; height: 46px;
    cursor: pointer; color: #fff; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  #sendBtn:disabled { background: rgba(79,142,247,0.2); cursor: not-allowed; }
  .footer { color: rgba(255,255,255,0.2); font-size: 11px; margin-top: 14px; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-6px); opacity: 1; }
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    70% { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }
</style>
</head>
<body>

<div class="badge">
  <span class="dot"></span>
  <span>University Student Portal — AI Assistant</span>
</div>

<div class="window">
  <div class="chat-header">
    <div class="avatar">U</div>
    <div class="header-info">
      <div class="name">UniBot</div>
      <div class="status"><span class="status-dot"></span> Online · Powered by Gemini AI</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar">U</div>
      <div class="bubble">👋 Hey! I'm <strong>UniBot</strong>, your university assistant. I can help you with courses, exams, deadlines, campus services, and more. What do you need today?</div>
    </div>
  </div>

  <div class="suggestions">
    <button class="chip" onclick="sendMessage('When is the final exam schedule out?')">When is the final exam schedule out?</button>
    <button class="chip" onclick="sendMessage('How do I get my transcript?')">How do I get my transcript?</button>
    <button class="chip" onclick="sendMessage('What are library hours?')">What are library hours?</button>
    <button class="chip" onclick="sendMessage('How to register for next semester?')">How to register for next semester?</button>
  </div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="Ask about courses, exams, deadlines..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<div class="footer">UniBot · University AI Assistant · 2025</div>

<script>
  const API_KEY = "AIzaSyCbxczhP2o6HZzZR5Ar34OyL10xpUJZ2ag";
  const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + API_KEY;

  const SYSTEM_PROMPT = "You are UniBot, an AI assistant for a university student portal. Help students with course registration, schedules, exam dates, campus facilities, tuition fees, financial aid, student ID, transcripts, clubs and events. Keep responses concise (2-4 sentences), friendly and helpful. If asked about something outside university scope, politely redirect.";

  let history = [];

  function scrollBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (role === 'bot') {
      div.innerHTML = '<div class="msg-avatar">U</div><div class="bubble">' + text + '</div>';
    } else {
      div.innerHTML = '<div class="bubble">' + text + '</div>';
    }
    msgs.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="msg-avatar">U</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage(text) {
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const userText = text || input.value.trim();
    if (!userText) return;

    input.value = '';
    btn.disabled = true;
    addMessage('user', userText);
    history.push({ role: 'user', parts: [{ text: userText }] });
    showTyping();

    try {
      const body = {
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: history,
        generationConfig: { maxOutputTokens: 300, temperature: 0.7 }
      };

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (data.error) {
        removeTyping();
        addMessage('bot', '⚠️ API Error: ' + data.error.message);
        btn.disabled = false;
        return;
      }

      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't process that.";
      history.push({ role: 'model', parts: [{ text: reply }] });
      removeTyping();
      addMessage('bot', reply);
    } catch (e) {
      removeTyping();
      addMessage('bot', '⚠️ Connection error: ' + e.message);
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
